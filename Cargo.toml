[package]
name = "up-tui"
version = "0.1.0"
edition = "2024"

[dependencies]
ratatui = "0.30"
crossterm = "0.29"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.13", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "1.0"
dirs = "6"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1"
ratatui-themes = { version = "0.2", features = ["serde"] }
